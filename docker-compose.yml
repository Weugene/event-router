services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-router-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: event-router-postgres
    environment:
      POSTGRES_DB: event_router
      POSTGRES_USER: event_router
      POSTGRES_PASSWORD: event_router
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_router -d event_router"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
